name: Generate 3D Contribution Graph

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  # Minimize permissions - only grant what's necessary

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate 3D Contribution Graph
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false  # Better security practice

      - uses: yoshi389111/github-profile-3d-contrib@0.8.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: shamas202

      - name: Commit & Push
        run: |
          git config user.email "shamszia@example.com"
          git config user.name "Shams Zia"
          git add -A
          git commit -m "Update 3D contribution graph" || echo "No changes to commit"
          git push